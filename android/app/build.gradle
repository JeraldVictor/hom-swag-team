apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace = "com.homswag.partner"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.homswag.partner"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 15
        versionName "1.0.15"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // Load signing config from local.properties or project properties / env
            def releaseStoreFile = project.hasProperty('RELEASE_STORE_FILE') ? project.property('RELEASE_STORE_FILE') : System.getenv('RELEASE_STORE_FILE')
            def releaseStorePassword = project.hasProperty('RELEASE_STORE_PASSWORD') ? project.property('RELEASE_STORE_PASSWORD') : System.getenv('RELEASE_STORE_PASSWORD')
            def releaseKeyAlias = project.hasProperty('RELEASE_KEY_ALIAS') ? project.property('RELEASE_KEY_ALIAS') : System.getenv('RELEASE_KEY_ALIAS')
            def releaseKeyPassword = project.hasProperty('RELEASE_KEY_PASSWORD') ? project.property('RELEASE_KEY_PASSWORD') : System.getenv('RELEASE_KEY_PASSWORD')

            def localProperties = new Properties()
            def localPropertiesFile = rootProject.file('local.properties')
            if (localPropertiesFile.exists()) {
                localPropertiesFile.withReader('UTF-8') { reader ->
                    localProperties.load(reader)
                }
                releaseStoreFile = releaseStoreFile ?: localProperties.getProperty('release.store.file')
                releaseStorePassword = releaseStorePassword ?: localProperties.getProperty('release.store.password')
                releaseKeyAlias = releaseKeyAlias ?: localProperties.getProperty('release.key.alias')
                releaseKeyPassword = releaseKeyPassword ?: localProperties.getProperty('release.key.password')
            }

            if (releaseStoreFile) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            ndk {
                debugSymbolLevel = 'FULL'
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (project.hasProperty('RELEASE_STORE_FILE') || rootProject.file('local.properties').exists()) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // Firebase BoM — manages all Firebase dependency versions
    implementation platform('com.google.firebase:firebase-bom:34.13.0')

    // Firebase Cloud Messaging (no version needed when using BoM)
    implementation 'com.google.firebase:firebase-messaging'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
